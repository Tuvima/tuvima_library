<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tuvima · Form inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#0B1220;}
  .card{padding:24px;font-family:var(--tv-font-sans);display:flex;flex-direction:column;gap:14px;}
  .lbl{font-size:10px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;color:rgba(248,248,248,.50);}
  .search{
    display:flex;align-items:center;gap:10px;
    padding:10px 14px;border-radius:10px;
    border:1px solid rgba(255,255,255,.08);
    background:rgba(255,255,255,.03);
  }
  .search:focus-within{border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.05);}
  .search input{
    flex:1;background:transparent;border:none;outline:none;
    color:rgba(255,255,255,.85);font-family:var(--tv-font-sans);font-size:13px;
  }
  .search input::placeholder{color:rgba(255,255,255,.25);}
  .search svg{width:14px;height:14px;color:rgba(255,255,255,.3);}

  .toggle-group{
    display:inline-flex;gap:4px;padding:4px;border-radius:14px;
    border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);
  }
  .toggle{
    padding:7px 14px;border-radius:10px;border:none;cursor:pointer;
    font-family:var(--tv-font-sans);font-size:12px;font-weight:500;
    color:rgba(248,248,248,.56);background:transparent;
  }
  .toggle.active{background:rgba(234,179,8,.18);color:#FCD34D;}
  .toggle:hover:not(.active){color:rgba(248,248,248,.88);}

  .switch{
    position:relative;width:36px;height:20px;border-radius:999px;
    background:rgba(255,255,255,.1);cursor:pointer;
  }
  .switch.on{background:#EAB308;}
  .switch::after{
    content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;
    border-radius:50%;background:#fff;transition:transform .2s;
  }
  .switch.on::after{transform:translateX(16px);}

  .toggle-row{display:flex;align-items:center;gap:16px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);}
  .toggle-row:last-child{border:0;}
  .toggle-info{flex:1;}
  .tn{font-size:13px;font-weight:600;color:rgba(248,248,248,.85);}
  .td{font-size:11.5px;color:rgba(248,248,248,.45);margin-top:2px;}
</style>
</head>
<body>
<div class="card">
  <div class="search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input placeholder="Search your library…"/>
  </div>

  <div class="toggle-group">
    <button class="toggle active">All</button>
    <button class="toggle">Books</button>
    <button class="toggle">Movies</button>
    <button class="toggle">TV</button>
    <button class="toggle">Music</button>
  </div>

  <div class="toggle-row">
    <div class="toggle-info">
      <div class="tn">Auto-import watched folders</div>
      <div class="td">New files are added to the library automatically.</div>
    </div>
    <div class="switch on"></div>
  </div>
  <div class="toggle-row">
    <div class="toggle-info">
      <div class="tn">Run enrichment overnight</div>
      <div class="td">Schedule Stage 2 Wikidata enrichment at 2am local.</div>
    </div>
    <div class="switch"></div>
  </div>
</div>
</body>
</html>
