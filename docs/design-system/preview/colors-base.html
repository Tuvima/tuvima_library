<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tuvima · Color palette — base</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#0B1220;}
  .card{
    padding:20px 22px;
    display:grid;
    grid-template-columns:repeat(8,1fr);
    gap:14px 10px;
    font-family:var(--tv-font-sans);
  }
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{
    height:56px;border-radius:10px;
    border:1px solid var(--tv-glass-inner-border);
    box-shadow:var(--tv-inset-glow);
  }
  .lbl{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:rgba(248,248,248,.72);}
  .val{font-family:var(--tv-font-mono);font-size:10px;color:rgba(248,248,248,.40);}
  .section{grid-column:1/-1;font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:rgba(248,248,248,.35);margin-top:4px;margin-bottom:-4px;}
</style>
</head>
<body>
<div class="card">

  <div class="section">Base</div>

  <div class="sw"><div class="chip" style="background:linear-gradient(180deg,#0B1220,#111827)"></div><div class="lbl">bg base</div><div class="val">#0B1220→#111827</div></div>
  <div class="sw"><div class="chip" style="background:rgba(12,16,36,0.92);backdrop-filter:blur(4px)"></div><div class="lbl">dock bg</div><div class="val">#080D1E 92%</div></div>
  <div class="sw"><div class="chip" style="background:rgba(15,23,42,0.92)"></div><div class="lbl">surface 1</div><div class="val">0F172A 92%</div></div>
  <div class="sw"><div class="chip" style="background:rgba(30,41,59,0.58)"></div><div class="lbl">surface 3</div><div class="val">1E293B 58%</div></div>

  <div class="section">Amber accent</div>

  <div class="sw"><div class="chip" style="background:#EAB308"></div><div class="lbl">amber</div><div class="val">#EAB308</div></div>
  <div class="sw"><div class="chip" style="background:#C9922E"></div><div class="lbl">amber deep</div><div class="val">#C9922E</div></div>
  <div class="sw"><div class="chip" style="background:linear-gradient(135deg,#D4A03C,#B87820)"></div><div class="lbl">cta grad</div><div class="val">D4A03C→B87820</div></div>
  <div class="sw"><div class="chip" style="background:rgba(234,179,8,.22)"></div><div class="lbl">active tint</div><div class="val">EAB308 22%</div></div>

  <div class="section">Foreground</div>

  <div class="sw"><div class="chip" style="background:rgba(248,250,252,.98)"></div><div class="lbl">fg primary</div><div class="val">F8FAFC 98%</div></div>
  <div class="sw"><div class="chip" style="background:rgba(248,248,248,.85)"></div><div class="lbl">fg</div><div class="val">F8F8F8 85%</div></div>
  <div class="sw"><div class="chip" style="background:rgba(248,248,248,.50)"></div><div class="lbl">fg muted</div><div class="val">F8F8F8 50%</div></div>
  <div class="sw"><div class="chip" style="background:rgba(248,248,248,.38)"></div><div class="lbl">fg faint</div><div class="val">F8F8F8 38%</div></div>
</div>
</body>
</html>
