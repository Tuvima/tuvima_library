<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tuvima · Amber CTA — states</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#0B1220;}
  .card{padding:28px;font-family:var(--tv-font-sans);display:flex;gap:28px;align-items:center;justify-content:center;}
  .cell{display:flex;flex-direction:column;gap:10px;align-items:center;}
  .cta{
    display:inline-flex;align-items:center;gap:10px;
    font-weight:700;font-size:14px;color:#1A1208;letter-spacing:.01em;
    padding:14px 24px;border-radius:8px;
    border:1.5px solid rgba(0,0,0,.15);cursor:pointer;
  }
  .cta .play{width:0;height:0;border-left:9px solid #1A1208;border-top:6px solid transparent;border-bottom:6px solid transparent;}
  .cta.rest{background:linear-gradient(135deg,#D4A03C,#B87820);box-shadow:0 4px 18px rgba(185,120,32,.30);}
  .cta.hover{background:linear-gradient(135deg,#DDA840,#C08428);box-shadow:0 6px 24px rgba(185,120,32,.50);border-color:rgba(0,0,0,.22);}
  .cta.active{background:linear-gradient(135deg,#B87820,#9A6318);box-shadow:0 2px 10px rgba(185,120,32,.40);transform:translateY(1px);}
  .cta.disabled{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.06);color:rgba(255,255,255,.25);box-shadow:none;cursor:not-allowed;}
  .cta.disabled .play{border-left-color:rgba(255,255,255,.25);}
  .lbl{font-size:10px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;color:rgba(248,248,248,.45);}
</style>
</head>
<body>
<div class="card">
  <div class="cell"><button class="cta rest"><span class="play"></span>Continue Reading</button><div class="lbl">rest</div></div>
  <div class="cell"><button class="cta hover"><span class="play"></span>Continue Reading</button><div class="lbl">hover</div></div>
  <div class="cell"><button class="cta active"><span class="play"></span>Continue Reading</button><div class="lbl">active</div></div>
  <div class="cell"><button class="cta disabled"><span class="play"></span>Continue Reading</button><div class="lbl">disabled</div></div>
</div>
</body>
</html>
