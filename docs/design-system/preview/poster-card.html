<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tuvima · Media poster card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:linear-gradient(180deg,#0b1220,#111827);}
  .wrap{padding:20px 22px;font-family:var(--tv-font-sans);display:flex;gap:14px;}
  .poster{
    width:150px;display:flex;flex-direction:column;gap:8px;cursor:pointer;
  }
  .art{
    aspect-ratio:2/3;border-radius:8px;overflow:hidden;position:relative;
    box-shadow:0 2px 8px rgba(0,0,0,.30);
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .poster:hover .art{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.55);}
  .art::after{content:"";position:absolute;inset:0;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);border-radius:8px;}
  .art .cover{width:100%;height:100%;background:linear-gradient(155deg,#4B3B2E 0%,#1F1008 100%);display:flex;align-items:flex-end;padding:10px;color:#E9D8B8;font-family:'Merriweather',serif;font-weight:700;font-size:22px;letter-spacing:.02em;}
  .art .cover.dune{background:linear-gradient(160deg,#C28B4A 0%,#6B3F1A 50%,#1F0E04 100%);}
  .art .cover.amer{background:linear-gradient(155deg,#0F2A4A,#0A1020 80%);color:#DDE6F2;}
  .art .cover.bbc{background:linear-gradient(160deg,#4B1C2C,#160610);color:#E8D2CF;}
  .bar{
    position:absolute;left:0;bottom:0;height:3px;background:#C9922E;
  }
  .progress-shade{position:absolute;left:0;right:0;bottom:0;height:3px;background:rgba(0,0,0,.35);}
  .ribbon{
    position:absolute;top:8px;left:8px;font-size:9.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
    padding:3px 7px;border-radius:4px;color:#1A1208;background:#EAB308;
  }
  .title{font-size:13px;font-weight:600;color:rgba(248,248,248,.88);line-height:1.3;text-overflow:ellipsis;overflow:hidden;white-space:nowrap;}
  .meta{font-size:11px;color:rgba(248,248,248,.45);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .types{display:flex;gap:4px;margin-top:2px;}
  .tdot{width:6px;height:6px;border-radius:50%;}
  .tdot.book{background:#A78BFA;}
  .tdot.audio{background:#60A5FA;}
  .tdot.movie{background:#F472B6;}
  .tdot.tv{background:#34D399;}
</style>
</head>
<body>
<div class="wrap">
  <div class="poster">
    <div class="art">
      <div class="cover dune">Dune</div>
      <div class="progress-shade"></div>
      <div class="bar" style="width:38%"></div>
    </div>
    <div class="title">Dune</div>
    <div class="meta">Frank Herbert · 38%</div>
    <div class="types"><span class="tdot book"></span><span class="tdot audio"></span><span class="tdot movie"></span></div>
  </div>
  <div class="poster">
    <div class="art">
      <div class="cover amer">American<br>Gods</div>
      <div class="ribbon">New</div>
    </div>
    <div class="title">American Gods</div>
    <div class="meta">Neil Gaiman · 2019</div>
    <div class="types"><span class="tdot audio"></span></div>
  </div>
  <div class="poster">
    <div class="art">
      <div class="cover bbc">Peaky<br>Blinders</div>
    </div>
    <div class="title">Peaky Blinders</div>
    <div class="meta">BBC · 6 seasons</div>
    <div class="types"><span class="tdot tv"></span></div>
  </div>
</div>
</body>
</html>
