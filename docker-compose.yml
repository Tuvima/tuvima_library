# ── Tuvima Library — Docker Compose ──────────────────────────────────────────
#
# Usage:
#   docker compose up -d          Start Tuvima Library
#   docker compose logs -f        Follow logs
#   docker compose down           Stop and remove containers
#
# Engine on port 8080, Dashboard on port 8081 — both in a single container.
# Media files go in ./library/, new files go in ./watch/.
# ──────────────────────────────────────────────────────────────────────────────

services:
  tuvima:
    image: tuvima/tuvima-library:latest
    # To build locally instead, uncomment the lines below and comment out the image line:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: tuvima-library
    ports:
      - "8080:8080"   # Engine API
      - "8081:8081"   # Dashboard UI
    volumes:
      - tuvima-data:/data
      - ./config:/app/config
      - ./library:/library
      - ./watch:/watch
    environment:
      - MediaEngine__DatabasePath=/data/library.db
      - MediaEngine__ConfigDirectory=/app/config
      - MediaEngine__Security__LocalhostBypass=true
    restart: unless-stopped

volumes:
  tuvima-data:
    driver: local
