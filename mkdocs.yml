site_name: Tuvima Library
site_description: User and developer documentation for Tuvima Library, the local-first story library.
site_url: https://tuvima.github.io/tuvima_library/
repo_url: https://github.com/Tuvima/tuvima_library
repo_name: Tuvima/tuvima_library
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site
strict: true
not_in_nav: |
  /404.md
  /providers.md
  /settings-architecture.md
  /architecture/api-boundaries.md
  /architecture/api-boundary-debt.md
  /architecture/collections.md
  /architecture/configuration.md
  /architecture/display-api.md
  /architecture/js-interop.md
  /architecture/localization.md
  /architecture/openapi-migration.md
  /architecture/project-boundaries.md
  /architecture/storage-policy-adr.md
  /architecture/storage-policy-review.md
  /design-system/README.md
  /design-system/SKILL.md
  /design-system/visual-qa-checklist.md
  /proposals/wikidata-recon-library-improvements.md
  /reference/display-api.md
  /ui/ui-consistency-audit.md
  /design-system/ui_kits/dashboard/README.md

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/lightbulb-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/lightbulb
        name: Switch to light mode

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/extra.css

nav:
  - Home: index.md
  - Product:
      - Product Status: product/status.md
      - Feature Truth Inventory: product/feature-truth-inventory.md
      - Privacy and Local-First Behavior: explanation/privacy-local-first.md
      - Attributions: reference/attributions.md
  - Getting Started:
      - Getting Started: tutorials/getting-started.md
      - Your First Library: tutorials/first-library.md
      - Add Media: guides/adding-media.md
      - Troubleshooting: guides/troubleshooting.md
  - Use Tuvima:
      - Resolve Review Items: guides/resolving-reviews.md
      - Configure Providers: guides/configuring-providers.md
      - Language Setup: guides/language-setup.md
      - Use Plugins: guides/using-plugins.md
      - Understand Universes and Shelves: explanation/how-universes-work.md
      - Understand Ingestion: explanation/how-ingestion-works.md
      - Understand Library Operations: library-operations.md
      - Understand Enrichment: explanation/how-hydration-works.md
      - Understand Scoring: explanation/how-scoring-works.md
      - Understand Local AI: explanation/how-ai-works.md
      - Roll Out a Local AI Model: guides/local-ai-model-rollout.md
  - Reference:
      - Configuration Reference: reference/configuration.md
      - AI Configuration Reference: reference/ai-configuration.md
      - Providers Reference: reference/providers.md
      - Plugin Catalog: reference/plugin-catalog.md
      - Media Types: reference/media-types.md
      - Artwork Types: reference/artwork-types.md
      - Glossary: reference/glossary.md
      - API Endpoints: reference/api-endpoints.md
      - Database Schema: reference/database-schema.md
