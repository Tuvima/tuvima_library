# ─────────────────────────────────────────────────────────────────────────────
# Tuvima Library — Build & Publish Docker image to GitHub Packages
#
# Image name:  ghcr.io/tuvima/tuvima_library
# Push rules:
#   • Push to main      → :latest
#   • Push tag v1.2.3   → :v1.2.3  :1.2  :1
#   • Pull request      → build only (no push), validates the Dockerfile
# ─────────────────────────────────────────────────────────────────────────────

name: Build & publish Docker image

on:
  push:
    branches: [ "main" ]
    tags:     [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]

env:
  IMAGE_HOST:  ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # → tuvima/tuvima_library

jobs:
  build-and-push:
    name: Build image and push to GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read    # checkout
      packages: write   # push to ghcr.io

    steps:
      # ── 1. Source code ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Docker tooling ───────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Authenticate (skipped on pull requests) ──────────────────────────
      - name: Log in to GitHub Packages
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # ── 4. Compute image tags ────────────────────────────────────────────────
      # main branch  → ghcr.io/tuvima/tuvima_library:latest
      # v1.2.3 tag   → ghcr.io/tuvima/tuvima_library:v1.2.3
      #                ghcr.io/tuvima/tuvima_library:1.2
      #                ghcr.io/tuvima/tuvima_library:1
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_HOST }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      # ── 5. Build & push ──────────────────────────────────────────────────────
      # GitHub Actions layer cache (type=gha) makes successive builds fast by
      # reusing the NuGet restore and SDK image layers from the previous run.
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context:    .
          push:       ${{ github.event_name != 'pull_request' }}
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
