# ─────────────────────────────────────────────────────────────────────────────
# release.yml — builds and publishes the Windows installer on every v*.*.* tag
#
# Trigger:  git tag v1.2.3 && git push --tags
# Output:   GitHub Release with TuvimaLibrary-Setup-1.2.3.exe attached
# ─────────────────────────────────────────────────────────────────────────────
name: Windows Installer Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── .NET 10 SDK ──────────────────────────────────────────────────────────
      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.2xx"

      # ── Inno Setup 6 ────────────────────────────────────────────────────────
      - name: Install Inno Setup 6
        run: choco install innosetup --version 6.3.3 --no-progress -y
        shell: pwsh

      # ── Extract version from tag (v1.2.3 → 1.2.3) ─────────────────────────
      - name: Extract version
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart('v')
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
        shell: pwsh

      # ── Publish Engine (win-x64, self-contained) ─────────────────────────
      - name: Publish Engine
        run: |
          dotnet publish src/MediaEngine.Api/MediaEngine.Api.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output dist/win/engine `
            -p:PublishSingleFile=false `
            -p:UseAppHost=true `
            -p:Version=${{ steps.version.outputs.VERSION }}
        shell: pwsh

      # ── Publish Dashboard (win-x64, self-contained) ───────────────────────
      - name: Publish Dashboard
        run: |
          dotnet publish src/MediaEngine.Web/MediaEngine.Web.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output dist/win/dashboard `
            -p:PublishSingleFile=false `
            -p:UseAppHost=true `
            -p:Version=${{ steps.version.outputs.VERSION }}
        shell: pwsh

      # ── Compile installer with updated version ────────────────────────────
      - name: Compile Inno Setup installer
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=$ver" `
            "installer.iss"
        shell: pwsh

      # ── Upload installer as GitHub Release artifact ───────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Tuvima Library v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Installation

            Download and run `TuvimaLibrary-Setup-${{ steps.version.outputs.VERSION }}.exe`.

            The installer will:
            - Install the Engine and Dashboard as Windows services
            - Create data folders in `C:\ProgramData\Tuvima\`
            - Seed default configuration from `config.example\`
            - Add a desktop shortcut that opens the Dashboard in your browser

            **Requirements:** Windows 10/11 (64-bit), administrator privileges.
          files: dist/TuvimaLibrary-Setup-${{ steps.version.outputs.VERSION }}.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
